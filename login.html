<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anmelden — mitarbeiter.com</title>
<script>if(location.protocol!=='https:'&&!location.hostname.includes('localhost')&&!location.hostname.includes('127.0.0.1')){location.replace('https://'+location.host+location.pathname+location.search);}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --bb:#00AAEE; --bb2:#0088CC; --bd:#060f1c; --bm:#0D1F35; }
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ height:100%; font-family:'Inter',system-ui,sans-serif; overflow:hidden; }

/* ── CUSTOM CURSOR ── */
*{ cursor:none !important; }
#cursor-dot{
  position:fixed; width:8px; height:8px; border-radius:50%;
  background:var(--bb); pointer-events:none; z-index:9999;
  transform:translate(-50%,-50%);
  transition:width .15s,height .15s,background .15s,opacity .15s;
  box-shadow:0 0 10px rgba(0,170,238,.8);
}
#cursor-ring{
  position:fixed; width:36px; height:36px; border-radius:50%;
  border:1.5px solid rgba(0,170,238,.5); pointer-events:none; z-index:9998;
  transform:translate(-50%,-50%);
  transition:width .3s ease,height .3s ease,border-color .3s,opacity .2s;
}
body.cur-hover #cursor-dot{ width:12px; height:12px; background:#fff; box-shadow:0 0 20px rgba(0,170,238,1); }
body.cur-hover #cursor-ring{ width:52px; height:52px; border-color:rgba(0,170,238,.8); border-width:2px; }

/* ── BACKGROUND ── */
.bg{
  position:fixed; inset:0;
  background:url('a81-2.jpg') center center / cover no-repeat;
  z-index:0;
}
.bg::after{
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg, rgba(6,15,28,.85) 0%, rgba(13,31,53,.78) 50%, rgba(6,15,28,.90) 100%);
}

/* ── PARTICLE CANVAS (z-index between overlay and card) ── */
#hero-canvas{
  position:fixed; inset:0;
  width:100%; height:100%;
  pointer-events:none; z-index:2;
}

/* ── PAGE ── */
.page{
  position:relative; z-index:3;
  min-height:100vh;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:24px;
}

/* ── LIQUID GLASS CARD ── */
.card{
  width:100%; max-width:400px;
  padding:44px 40px;
  background:rgba(255,255,255,.07);
  backdrop-filter:blur(28px) saturate(180%);
  -webkit-backdrop-filter:blur(28px) saturate(180%);
  border:1px solid rgba(255,255,255,.14);
  border-radius:20px;
  box-shadow:
    0 8px 40px rgba(0,0,0,.55),
    0 0 0 0.5px rgba(255,255,255,.08) inset,
    0 1px 0 rgba(255,255,255,.18) inset;
  position:relative;
}
/* thin top highlight */
.card::before{
  content:''; display:block; position:absolute;
  top:0; left:20px; right:20px; height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.32),transparent);
}

/* ── BRAND ── */
.brand{ text-align:center; margin-bottom:36px; }
.brand img{ width:100%; max-height:44px; object-fit:contain; }
.brand-line{ width:36px; height:2px; background:var(--bb); border-radius:2px; margin:14px auto 0; }

h1{ font-size:20px; font-weight:700; color:#fff; text-align:center; margin-bottom:5px; letter-spacing:-.02em; }
.sub{ font-size:13px; color:rgba(255,255,255,.42); text-align:center; margin-bottom:28px; }

/* ── FORM ── */
.form-group{ margin-bottom:14px; }
label{
  display:block; font-size:10.5px; font-weight:600;
  color:rgba(255,255,255,.45); text-transform:uppercase;
  letter-spacing:.07em; margin-bottom:7px;
}
input{
  width:100%; padding:11px 15px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1); border-radius:10px;
  color:#fff; font-family:'Inter',sans-serif; font-size:14px; outline:none;
  transition:border-color .2s, background .2s, box-shadow .2s;
}
input::placeholder{ color:rgba(255,255,255,.25); }
input:focus{ border-color:var(--bb); background:rgba(0,170,238,.07); box-shadow:0 0 0 3px rgba(0,170,238,.15); }

.pw-wrap{ position:relative; }
.pw-wrap .eye{
  position:absolute; right:13px; top:50%; transform:translateY(-50%);
  font-size:15px; color:rgba(255,255,255,.3); user-select:none; transition:color .2s;
}
.pw-wrap .eye:hover{ color:rgba(255,255,255,.65); }

/* ── ERROR ── */
.error-msg{
  background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.28);
  border-radius:8px; padding:10px 14px; font-size:13px; color:#fca5a5;
  margin-bottom:14px; display:none;
}

/* ── BUTTON ── */
.btn{
  width:100%; padding:13px;
  background:var(--bb); border:none; border-radius:10px;
  color:#fff; font-family:'Inter',sans-serif; font-size:14px;
  font-weight:600; letter-spacing:.02em;
  cursor:pointer; margin-top:8px;
  transition:background .2s, box-shadow .2s, transform .1s;
  position:relative; overflow:hidden;
}
.btn::after{
  content:''; position:absolute; inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,.12) 0%,transparent 100%);
  border-radius:inherit; pointer-events:none;
}
.btn:hover{ background:#12c3ff; box-shadow:0 6px 24px rgba(0,170,238,.35); }
.btn:active{ transform:scale(.99); }
.btn:disabled{ opacity:.5; }

/* ── FOOTER ── */
.footer-block{ text-align:center; margin-top:20px; }
.footer-internal{
  display:inline-block;
  font-size:11px; font-weight:700; letter-spacing:.14em;
  color:rgba(0,170,238,.95); text-transform:uppercase;
  border:1px solid rgba(0,170,238,.45); border-radius:4px;
  padding:4px 12px; margin-bottom:8px;
}
.footer-company{ font-size:12px; color:rgba(255,255,255,.45); }

/* ── MOBILE / TOUCH: disable custom cursor + particles ── */
@media (pointer: coarse) {
  *{ cursor: auto !important; }
  #cursor-dot, #cursor-ring{ display: none !important; }
  #hero-canvas{ display: none !important; }
}
</style>
</head>
<body>

<div class="bg"></div>
<canvas id="hero-canvas"></canvas>

<div id="cursor-dot"></div>
<div id="cursor-ring"></div>

<div class="page">
  <div class="card">
    <div class="brand">
      <img src="logo-light.png" alt="mitarbeiter.com">
      <div class="brand-line"></div>
    </div>

    <h1>Willkommen zurück</h1>
    <p class="sub">Melde dich an, um auf deine Inhalte zuzugreifen.</p>

    <div class="error-msg" id="error">E-Mail oder Passwort ungültig.</div>

    <form onsubmit="doLogin(event)">
      <div class="form-group">
        <label>E-Mail</label>
        <input type="email" id="email" placeholder="dein@mitarbeiter.com"
               autocomplete="email" required autofocus>
      </div>
      <div class="form-group">
        <label>Passwort</label>
        <div class="pw-wrap">
          <input type="password" id="pw" placeholder="••••••••"
                 autocomplete="current-password" required>
          <span class="eye" onclick="togglePw()">👁</span>
        </div>
      </div>
      <button class="btn" type="submit" id="btn">Anmelden</button>
    </form>
  </div>

  <div class="footer-block">
    <div class="footer-internal">FOR INTERNAL USE ONLY</div><br>
    <span class="footer-company">mitarbeiter.com Digital Recruiting GmbH</span>
  </div>
</div>

<script>
// ── AUTH (passwords stored as SHA-256 hashes — never plaintext) ──
const USERS = {
  'sw@mitarbeiter.com': { h:'040fc1b1a79f552e1d0f51b75a186548c7aeced36ac64cba7f281f1be62a0f7a', name:'Steffen Winter', role:'inhaber', initials:'SW' },
  'cc@mitarbeiter.com': { h:'040fc1b1a79f552e1d0f51b75a186548c7aeced36ac64cba7f281f1be62a0f7a', name:'Carlo C.',       role:'admin',   initials:'CC' },
  'js@mitarbeiter.com': { h:'040fc1b1a79f552e1d0f51b75a186548c7aeced36ac64cba7f281f1be62a0f7a', name:'Jean S.',        role:'admin',   initials:'JS' },
};
if (localStorage.getItem('mcom_auth')) location.href = 'index.html';

// Pure-JS SHA-256 fallback (works without HTTPS / crypto.subtle)
function sha256Sync(msg) {
  function rr(v,a){return(v>>>a)|(v<<(32-a));}
  const K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
           0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
           0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
           0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
           0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
           0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
           0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
           0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
  let h0=0x6a09e667,h1=0xbb67ae85,h2=0x3c6ef372,h3=0xa54ff53a,
      h4=0x510e527f,h5=0x9b05688c,h6=0x1f83d9ab,h7=0x5be0cd19;
  const bytes=new TextEncoder().encode(msg);
  const len=bytes.length;
  const bitLen=len*8;
  const padLen=((len+9)%64<=0?128:64)-((len+9)%64)+len+9;
  const buf=new Uint8Array(padLen);
  buf.set(bytes); buf[len]=0x80;
  new DataView(buf.buffer).setUint32(padLen-4,bitLen,false);
  for(let off=0;off<padLen;off+=64){
    const w=new Array(64);
    for(let i=0;i<16;i++) w[i]=new DataView(buf.buffer).getUint32(off+i*4,false);
    for(let i=16;i<64;i++){
      const s0=(rr(w[i-15],7)^rr(w[i-15],18)^(w[i-15]>>>3));
      const s1=(rr(w[i-2],17)^rr(w[i-2],19)^(w[i-2]>>>10));
      w[i]=(w[i-16]+s0+w[i-7]+s1)|0;
    }
    let [a,b,c,d,e,f,g,h]=[h0,h1,h2,h3,h4,h5,h6,h7];
    for(let i=0;i<64;i++){
      const S1=(rr(e,6)^rr(e,11)^rr(e,25));
      const ch=(e&f)^(~e&g);
      const t1=(h+S1+ch+K[i]+w[i])|0;
      const S0=(rr(a,2)^rr(a,13)^rr(a,22));
      const maj=(a&b)^(a&c)^(b&c);
      const t2=(S0+maj)|0;
      [h,g,f,e,d,c,b,a]=[g,f,e,(d+t1)|0,c,b,a,(t1+t2)|0];
    }
    h0=(h0+a)|0; h1=(h1+b)|0; h2=(h2+c)|0; h3=(h3+d)|0;
    h4=(h4+e)|0; h5=(h5+f)|0; h6=(h6+g)|0; h7=(h7+h)|0;
  }
  return [h0,h1,h2,h3,h4,h5,h6,h7].map(n=>(n>>>0).toString(16).padStart(8,'0')).join('');
}

async function sha256(str) {
  if (window.crypto?.subtle) {
    try {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    } catch(e) { /* fall through to sync */ }
  }
  return sha256Sync(str);
}

async function doLogin(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim().toLowerCase();
  const pw    = document.getElementById('pw').value;
  const btn   = document.getElementById('btn');
  const err   = document.getElementById('error');
  btn.disabled = true; btn.textContent = 'Prüfe…'; err.style.display = 'none';
  try {
    const h = await sha256(pw);
    const u = USERS[email];
    const override = localStorage.getItem(`mcom_pwhash_${email}`);
    const expectedH = override || u?.h;
    if (u && expectedH === h) {
      const { h: _, ...safe } = u;
      localStorage.setItem('mcom_auth', JSON.stringify({ email, ...safe, ts: Date.now() }));
      location.href = 'index.html';
    } else {
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Anmelden';
      document.getElementById('pw').value = '';
      document.getElementById('pw').focus();
    }
  } catch(ex) {
    err.textContent = 'Anmelde-Fehler. Bitte Seite neu laden.';
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Anmelden';
  }
}
function togglePw() {
  const p = document.getElementById('pw');
  p.type = p.type === 'password' ? 'text' : 'password';
}

// ── CUSTOM CURSOR ──
if (window.matchMedia('(pointer: fine)').matches) {
  const dot  = document.getElementById('cursor-dot');
  const ring = document.getElementById('cursor-ring');
  let mx=0, my=0, rx=0, ry=0;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    dot.style.left = mx+'px'; dot.style.top = my+'px';
  });
  (function lerpCursor(){
    rx += (mx-rx)*.12; ry += (my-ry)*.12;
    ring.style.left = rx+'px'; ring.style.top = ry+'px';
    requestAnimationFrame(lerpCursor);
  })();
  document.querySelectorAll('a,button,.btn,.eye').forEach(el => {
    el.addEventListener('mouseenter', () => document.body.classList.add('cur-hover'));
    el.addEventListener('mouseleave', () => document.body.classList.remove('cur-hover'));
  });
  document.addEventListener('mouseleave', () => { dot.style.opacity='0'; ring.style.opacity='0'; });
  document.addEventListener('mouseenter', () => { dot.style.opacity='1'; ring.style.opacity='1'; });
}

// ── PARTICLE FIELD ──
if (window.matchMedia('(pointer: fine)').matches) (function(){
  const canvas = document.getElementById('hero-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H, mouse = { x:-999, y:-999 };
  const COUNT = 80;
  const pts   = [];

  function resize(){
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  class Pt {
    constructor(){ this.reset(true); }
    reset(init){
      this.x = Math.random()*W;
      this.y = init ? Math.random()*H : H+10;
      this.vx = (Math.random()-.5)*.35;
      this.vy = -Math.random()*.5-.15;
      this.r  = Math.random()*4+2;
      this.alpha = Math.random()*.5+.2;
      this.rot  = Math.random()*Math.PI*2;
      this.rotV = (Math.random()-.5)*.018;
      this.life = 0;
      this.maxLife = Math.random()*700+400;
    }
    update(){
      const dx = this.x-mouse.x, dy = this.y-mouse.y;
      const d  = Math.sqrt(dx*dx+dy*dy);
      if(d<130){ const f=(130-d)/130*.7; this.vx+=dx/d*f; this.vy+=dy/d*f; }
      this.vx*=.98; this.vy*=.98;
      this.x+=this.vx; this.y+=this.vy;
      this.rot+=this.rotV;
      this.life++;
      if(this.life>this.maxLife||this.y<-10) this.reset(false);
    }
    draw(){
      const a = this.alpha*(1-this.life/this.maxLife);
      const s = this.r;
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rot);
      ctx.beginPath();
      ctx.rect(-s, -s, s*2, s*2);
      ctx.fillStyle=`rgba(0,170,238,${a})`;
      ctx.fill();
      ctx.restore();
    }
  }

  function drawLines(){
    for(let i=0;i<pts.length;i++){
      for(let j=i+1;j<pts.length;j++){
        const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<130){
          const mi=Math.sqrt((pts[i].x-mouse.x)**2+(pts[i].y-mouse.y)**2);
          const mj=Math.sqrt((pts[j].x-mouse.x)**2+(pts[j].y-mouse.y)**2);
          if(Math.min(mi,mj)>220) continue;
          ctx.beginPath();
          ctx.moveTo(pts[i].x,pts[i].y);
          ctx.lineTo(pts[j].x,pts[j].y);
          ctx.strokeStyle=`rgba(0,170,238,${(1-d/130)*.18})`;
          ctx.lineWidth=.6;
          ctx.stroke();
        }
      }
    }
  }

  for(let i=0;i<COUNT;i++) pts.push(new Pt());

  (function animate(){
    ctx.clearRect(0,0,W,H);
    drawLines();
    pts.forEach(p=>{p.update();p.draw();});
    requestAnimationFrame(animate);
  })();

  document.addEventListener('mousemove', e => {
    mouse.x = e.clientX; mouse.y = e.clientY;
  });
  document.addEventListener('mouseleave', () => { mouse.x=-999; mouse.y=-999; });
})();}
</script>
</body>
</html>
